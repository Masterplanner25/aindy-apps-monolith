[pytest]
# Dedicated config for the RTR-1 §5 nodus_vm validation (see
# HANDOFF-aindy-runtime-1.5.0.md §5 and .github/workflows/nodus-vm-integration.yml).
#
# Mirrors pytest.integration.ini's live-stack wiring but flips the two agent
# backends the §5 gate depends on:
#   - execution backend -> nodus_vm  (the opt-in VM path being validated)
#   - planner backend   -> anthropic_chat  (real LLM, so it selects a genuine
#                          app-manifest-only tool the runtime has no default for)
# pytest.integration.ini pins planner=disabled, so §5 needs its own config
# rather than an override (pytest-env's env block overrides os.environ).
#
# Run:
#   docker compose -f docker-compose.test.yml up -d
#   ANTHROPIC_API_KEY=sk-ant-... pytest -c pytest.nodus.ini tests/integration/test_nodus_vm.py -v
testpaths = tests/integration/test_nodus_vm.py
pythonpath = .
addopts = -q --disable-warnings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: full integration suite (database, Redis, Mongo)
    app_profile: requires app-owned bootstrap, routes, or models under apps/
    postgres: exercises PostgreSQL-specific behavior (FK cascades, JSONB, UUID)
# env requires pytest-env (pyproject.toml [test] deps). ANTHROPIC_API_KEY is
# deliberately NOT listed here — it is inherited from the process/CI environment
# (the repo secret) so it is never committed and the module self-skips when absent.
env =
    DATABASE_URL=postgresql://aindy_test:aindy_test@localhost:5433/aindy_test
    REDIS_URL=redis://localhost:6380/0
    MONGO_URL=mongodb://localhost:27017
    AINDY_ALLOW_SQLITE=false
    AINDY_SKIP_MONGO_PING=false
    SKIP_MONGO_PING=false
    TEST_MODE=true
    ENV=test
    TESTING=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    AINDY_ENABLE_BACKGROUND_TASKS=false
    AINDY_ENFORCE_SCHEMA=false
    SECRET_KEY=ci-integration-secret-key
    PERMISSION_SECRET=ci-integration-permission-secret
    AINDY_API_KEY=ci-integration-api-key
    OPENAI_API_KEY=sk-test-placeholder
    DEEPSEEK_API_KEY=ds-test-placeholder
    ALLOWED_ORIGINS=http://localhost:3000
    AINDY_ENABLE_LEGACY_SURFACE=true
    AINDY_AGENT_EXECUTION_BACKEND=nodus_vm
    AINDY_AGENT_PLANNER_BACKEND=anthropic_chat
    AINDY_AGENT_WAIT_BEFORE_HIGH_RISK=true
