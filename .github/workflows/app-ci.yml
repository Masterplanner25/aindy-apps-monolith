name: App CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-docs:
    name: App Docs And Contract Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint documentation frontmatter
        run: python scripts/lint_docs.py

      - name: Check API contract drift
        run: python scripts/check_api_contracts.py

  app-contracts:
    name: App Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [app-docs]

    env:
      ENV: test
      PYTHONPATH: .
      TESTING: "true"
      TEST_MODE: "true"
      DATABASE_URL: "sqlite:///:memory:"
      AINDY_ALLOW_SQLITE: "true"
      AINDY_SKIP_MONGO_PING: "true"
      SKIP_MONGO_PING: "true"
      MONGO_URL: ""
      OPENAI_API_KEY: sk-test-placeholder
      DEEPSEEK_API_KEY: ds-test-placeholder
      SECRET_KEY: ci-apps-secret-key
      PERMISSION_SECRET: ci-apps-permission-secret
      AINDY_API_KEY: ci-apps-api-key
      ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Temporary staged-release strategy:
      # until aindy-runtime is published to an index that GitHub Actions can
      # install from, app CI checks out the runtime repo explicitly and installs
      # it from source. The repo dependency contract in pyproject.toml remains
      # the long-term source of truth.
      - name: Checkout runtime repo with explicit token
        if: ${{ secrets.AINDY_RUNTIME_CHECKOUT_TOKEN != '' && vars.AINDY_RUNTIME_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AINDY_RUNTIME_REPO }}
          token: ${{ secrets.AINDY_RUNTIME_CHECKOUT_TOKEN }}
          path: _runtime_src

      - name: Checkout runtime repo with explicit repo path
        if: ${{ secrets.AINDY_RUNTIME_CHECKOUT_TOKEN == '' && vars.AINDY_RUNTIME_REPO != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AINDY_RUNTIME_REPO }}
          path: _runtime_src

      - name: Checkout runtime repo from owner default with explicit token
        if: ${{ vars.AINDY_RUNTIME_REPO == '' && secrets.AINDY_RUNTIME_CHECKOUT_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/aindy-runtime
          token: ${{ secrets.AINDY_RUNTIME_CHECKOUT_TOKEN }}
          path: _runtime_src

      - name: Checkout runtime repo from owner default
        if: ${{ vars.AINDY_RUNTIME_REPO == '' && secrets.AINDY_RUNTIME_CHECKOUT_TOKEN == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/aindy-runtime
          path: _runtime_src

      - name: Install runtime dependency from runtime repo source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r _runtime_src/AINDY/requirements.txt
          python -m pip install -e ./_runtime_src --no-deps --no-build-isolation
          python -m pip install -e .[test] --no-build-isolation

      - name: Verify installed runtime dependency
        run: |
          python - <<'PY'
          import importlib.metadata as md
          import importlib.util

          spec = importlib.util.find_spec('AINDY')
          paths = list(spec.submodule_search_locations or [])
          runtime_version = md.version('aindy-runtime')

          assert paths, 'AINDY namespace package did not resolve'
          assert any(
              '_runtime_src' in path.lower()
              or 'site-packages' in path.lower()
              or 'dist-packages' in path.lower()
              for path in paths
          ), paths
          assert runtime_version.startswith('1.'), runtime_version
          print({'aindy_paths': paths, 'aindy_runtime_version': runtime_version})
          PY

      - name: Smoke app-profile version surface
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          import AINDY.main as main
          from AINDY.platform_layer import registry as platform_registry

          client = TestClient(main.app, raise_server_exceptions=False)
          payload = client.get('/api/version').json()
          runtime = payload['runtime']
          compatibility = payload['compatibility']

          assert runtime['boot_mode'] == 'app-profile'
          assert runtime['boot_profile'] == 'default-apps'
          assert runtime['app_plugins_loaded'] is True
          assert runtime['app_plugin_count'] > 0
          assert len(platform_registry.get_registered_apps()) > 0
          assert compatibility['runtime_package']['name'] == 'aindy-runtime'
          assert compatibility['apps_repo_contract']['recommended_runtime_requirement'] == '>=1.0,<2.0'
          print(payload)
          PY

      - name: Check cross-app import boundaries
        run: python scripts/check_app_imports.py

      - name: Validate bootstrap dependency declarations
        run: python -c "from apps._bootstrap_validator import validate_bootstrap_deps; validate_bootstrap_deps('apps'); print('Bootstrap deps OK')"

      - name: Run app-profile suite
        run: >
          python -m pytest
          tests
          -m app_profile
          -q

  frontend-quality:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm test

  frontend-build:
    name: Frontend Build And Container Smoke
    runs-on: ubuntu-latest
    needs: [frontend-quality]
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - name: Client build smoke
        run: npm run build
        env:
          VITE_API_BASE_URL: "https://ci-placeholder.aindy.dev"

      - name: Client Docker build smoke
        run: docker build -f Dockerfile -t aindy-apps-client-ci:latest .
