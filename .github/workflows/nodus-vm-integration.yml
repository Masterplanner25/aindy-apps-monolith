name: Nodus VM Integration (RTR-1 §5)

# Validates the runtime's opt-in `nodus_vm` agent-execution backend end-to-end
# against a live Postgres stack, driving REAL app-manifest tools through the
# nodus_worker subprocess (handoff HANDOFF-aindy-runtime-1.5.0.md §5).
#
# This is the ONE validation that can only be done in this repo: whether app
# tools registered via aindy_plugins.json resolve AND execute inside the
# subprocess spawned by NodusRuntimeAdapter (the PLANNER-SUBPROC-1 risk class).
#
# Deterministic — no LLM, key, or network. Gate 1 uses the app-owned
# `stub_app_tool` planner to emit a `task.create` step (an app-manifest-only tool
# the runtime has no default for) and asserts it executes in the subprocess; Gate 2
# does the same for the WAIT/resume path over `memory.recall`. No `ANTHROPIC_API_KEY`
# secret is required (an earlier LLM-driven Gate 1 reduced to a skip because the CI
# runner cannot reach api.anthropic.com — see TECH_DEBT RTR-1-NODUS-APPTOOL-500).
#
# Not wired into the PR gate: it needs the full live Postgres/Redis/Mongo stack.
# Runs post-merge on main and on demand.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/agent/**"
      - "pyproject.toml"
      - "pytest.nodus.ini"
      - "tests/integration/test_nodus_vm.py"
      - ".github/workflows/nodus-vm-integration.yml"

permissions:
  contents: read

jobs:
  nodus-vm-integration:
    name: Nodus VM + App Tools (live Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: aindy_test
          POSTGRES_PASSWORD: aindy_test
          POSTGRES_DB: aindy_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U aindy_test -d aindy_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Verify runtime provides the RTR-1 resume surface (>= 1.5.3)
        # Importing runtime_api pulls in AINDY.db.database, which calls
        # create_engine(DATABASE_URL) at import time — so this standalone step
        # needs a parseable URL even though it never connects. Point it at the
        # live service for realism.
        env:
          DATABASE_URL: postgresql://aindy_test:aindy_test@localhost:5433/aindy_test
        run: |
          python - <<'PY'
          import importlib.metadata as md
          from packaging.version import Version

          version = md.version("aindy-runtime")
          assert Version(version) >= Version("1.5.3"), f"need aindy-runtime>=1.5.3, got {version}"

          # The resume symbol landed in 1.5.0. Execute-to-completion needs BOTH runtime
          # fixes: #152 / PR #155 (v1.5.2 — ExecutionPipeline marks itself active before
          # emitting execution.started) and #157 / PR #158 (v1.5.3 — idempotency gate no
          # longer casts a run-scoped execution_unit_id to a UUID column + savepoints the
          # lookup). >=1.5.3 has both, so Gate 2 hard-asserts completion — see TECH_DEBT
          # RTR-1-NODUS-COMPLETION.
          from AINDY.agents.runtime_api import resume_agent_run_runtime  # noqa: F401
          print(f"aindy-runtime {version}: resume_agent_run_runtime present")
          PY

      - name: Run §5 nodus_vm validation
        run: >-
          python -m pytest
          -c pytest.nodus.ini
          tests/integration/test_nodus_vm.py
          -v -ra
          -o log_cli=true --log-cli-level=WARNING
