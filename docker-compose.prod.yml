# Production-style overlay for the APP PROFILE: this repo's server image (apps consuming the
# installed aindy-runtime) plus its datastores. Follows the runtime's own `aindy-runtime init`
# compose shape (service `api`, /health healthcheck, pgvector, redis under a "full" profile),
# but builds the app image so apps.bootstrap registers the domains via the plugin ABI.
#
# Secrets come from the environment / an .env file — do not commit real values.
#   Required: SECRET_KEY, AINDY_API_KEY, PERMISSION_SECRET
#   Model keys (as used by the domains): OPENAI_API_KEY, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY
#   Optional: MONGO_URL (social layer; degradable), POSTGRES_PASSWORD
#
# Redis (distributed job queue / cross-instance events) is opt-in, mirroring the runtime:
#   set EXECUTION_MODE=distributed and run:  docker compose --profile full up -d
services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # psycopg2 is the runtime's bundled driver -> plain postgresql:// scheme.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aindy}:${POSTGRES_PASSWORD:-aindy}@postgres:5432/${POSTGRES_DB:-aindy}"
      REDIS_URL: "redis://redis:6379/0"
      MONGO_URL: "${MONGO_URL:-}"
      AINDY_HOST: "0.0.0.0"
      AINDY_PORT: "8000"
      # REQUIRED for the 17 domain apps to load. `aindy-runtime serve` setdefaults
      # AINDY_BOOT_MODE=runtime-only (platform-only profile = ZERO apps), so without
      # this the image would boot the runtime with no domains, no /apps/* routes, and
      # no agent planner. app-profile selects ./aindy_plugins.json -> apps.bootstrap.
      AINDY_BOOT_MODE: "${AINDY_BOOT_MODE:-app-profile}"
      AINDY_APP_PLUGIN_MANIFEST: "${AINDY_APP_PLUGIN_MANIFEST:-./aindy_plugins.json}"
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY}"
      AINDY_API_KEY: "${AINDY_API_KEY:?set AINDY_API_KEY}"
      PERMISSION_SECRET: "${PERMISSION_SECRET:?set PERMISSION_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Agent PLANNER backend (BUILD_PLAN Track 2). Default runtime_local (deterministic,
      # no egress). Flip to anthropic_chat in your .env to have Claude author real plans —
      # that path needs ANTHROPIC_API_KEY (above) + outbound HTTPS to api.anthropic.com.
      # See docs/deployment/DEPLOYMENT.md "Enabling the Claude planner".
      AINDY_AGENT_PLANNER_BACKEND: "${AINDY_AGENT_PLANNER_BACKEND:-runtime_local}"
      AINDY_CLAUDE_PLANNER_MODEL: "${AINDY_CLAUDE_PLANNER_MODEL:-}"
      # DB statement / idle-in-transaction reap timeouts (ms). The runtime defaults to 30000,
      # which is too tight for cold-start + agent-execution workloads on slower hosts: a
      # request that holds a transaction open across a slow external call (embeddings, an
      # agent step) gets its connection reaped mid-flight, poisoning the pool. Raised here
      # and env-overridable. See docs/deployment/DEPLOYMENT.md.
      DB_STATEMENT_TIMEOUT_MS: "${DB_STATEMENT_TIMEOUT_MS:-120000}"
      DB_IDLE_IN_TRANSACTION_TIMEOUT_MS: "${DB_IDLE_IN_TRANSACTION_TIMEOUT_MS:-120000}"
      # Connection-pool headroom — agent execution fans out concurrent memory/embedding
      # writes; the default 10+20 exhausts under that load on slower hosts.
      DB_POOL_SIZE: "${DB_POOL_SIZE:-20}"
      DB_MAX_OVERFLOW: "${DB_MAX_OVERFLOW:-40}"
      # Nodus per-execution budget. The worker cold-starts the app stack (~17 apps) per run;
      # the runtime default (30s script + 15s boot allowance) is too tight for an app-profile
      # cold-start on a slower host, so executions fail with "worker exceeded 45000ms hard
      # limit". Widened + env-overridable. See docs/deployment/DEPLOYMENT.md.
      AINDY_NODUS_MAX_EXECUTION_MS: "${AINDY_NODUS_MAX_EXECUTION_MS:-120000}"
      AINDY_NODUS_BOOT_ALLOWANCE_MS: "${AINDY_NODUS_BOOT_ALLOWANCE_MS:-60000}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-aindy}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-aindy}"
      POSTGRES_DB: "${POSTGRES_DB:-aindy}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aindy} -d ${POSTGRES_DB:-aindy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    profiles: ["full"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Social layer is Mongo-backed but degradable; enable if you need it and set MONGO_URL.
  # mongo:
  #   image: mongo:7
  #   profiles: ["full"]
  #   volumes:
  #     - mongo_data:/data/db

volumes:
  postgres_data:
  # mongo_data:
