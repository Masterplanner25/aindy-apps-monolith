# Production-style overlay for the APP PROFILE: this repo's server image (apps consuming the
# installed aindy-runtime) plus its datastores. Follows the runtime's own `aindy-runtime init`
# compose shape (service `api`, /health healthcheck, pgvector, redis under a "full" profile),
# but builds the app image so apps.bootstrap registers the domains via the plugin ABI.
#
# Secrets come from the environment / an .env file — do not commit real values.
#   Required: SECRET_KEY, AINDY_API_KEY, PERMISSION_SECRET
#   Model keys (as used by the domains): OPENAI_API_KEY, DEEPSEEK_API_KEY, ANTHROPIC_API_KEY
#   Optional: MONGO_URL (social layer; degradable), POSTGRES_PASSWORD
#
# Redis (distributed job queue / cross-instance events) is opt-in, mirroring the runtime:
#   set EXECUTION_MODE=distributed and run:  docker compose --profile full up -d
services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # psycopg2 is the runtime's bundled driver -> plain postgresql:// scheme.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-aindy}:${POSTGRES_PASSWORD:-aindy}@postgres:5432/${POSTGRES_DB:-aindy}"
      REDIS_URL: "redis://redis:6379/0"
      MONGO_URL: "${MONGO_URL:-}"
      AINDY_HOST: "0.0.0.0"
      AINDY_PORT: "8000"
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY}"
      AINDY_API_KEY: "${AINDY_API_KEY:?set AINDY_API_KEY}"
      PERMISSION_SECRET: "${PERMISSION_SECRET:?set PERMISSION_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-aindy}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-aindy}"
      POSTGRES_DB: "${POSTGRES_DB:-aindy}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aindy} -d ${POSTGRES_DB:-aindy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    profiles: ["full"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Social layer is Mongo-backed but degradable; enable if you need it and set MONGO_URL.
  # mongo:
  #   image: mongo:7
  #   profiles: ["full"]
  #   volumes:
  #     - mongo_data:/data/db

volumes:
  postgres_data:
  # mongo_data:
