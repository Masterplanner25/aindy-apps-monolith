[pytest]
testpaths = tests
pythonpath = .
addopts = -q --disable-warnings -m "not redis and not multi_instance and not mongo"
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    app_profile: requires app-owned bootstrap, routes, or models under apps/
    postgres: exercises PostgreSQL-specific behavior (FK cascades, JSONB, UUID)
    integration: full integration suite
    redis: requires a live Redis instance
    multi_instance: requires fakeredis
    mongo: requires MongoDB
# Run with:
#   docker compose -f docker-compose.test.yml up -d   (postgres-test only needed)
#   pytest -c pytest.postgres.ini -v
# env blocks require pytest-env (listed in pyproject.toml [test] deps).
env =
    DATABASE_URL=postgresql://aindy_test:aindy_test@localhost:5433/aindy_test
    AINDY_ALLOW_SQLITE=false
    AINDY_ENFORCE_SCHEMA=false
    AINDY_SKIP_MONGO_PING=true
    SKIP_MONGO_PING=true
    MONGO_URL=
    TEST_MODE=true
    ENV=test
    TESTING=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    AINDY_ENABLE_BACKGROUND_TASKS=false
    SECRET_KEY=ci-postgres-secret-key
    PERMISSION_SECRET=ci-postgres-permission-secret
    AINDY_API_KEY=ci-postgres-api-key
    OPENAI_API_KEY=sk-test-placeholder
    DEEPSEEK_API_KEY=ds-test-placeholder
    ALLOWED_ORIGINS=http://localhost:3000
    AINDY_ENABLE_LEGACY_SURFACE=true
