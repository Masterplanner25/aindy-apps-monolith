[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
addopts = -q --disable-warnings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: full integration suite — requires live Postgres, Redis, Mongo (see pytest.integration.ini)
    app_profile: requires app-owned bootstrap, routes, or models under apps/
    postgres: exercises behavior that differs between SQLite and PostgreSQL (FK cascades, JSONB, UUID)
    redis: requires a live Redis instance — set REDIS_URL before running
    multi_instance: requires fakeredis for cross-instance simulation
env =
    TEST_MODE=true
    ENFORCE_EXECUTION_CONTRACT=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    DATABASE_URL=sqlite:///:memory:
    AINDY_ALLOW_SQLITE=true
    AINDY_SKIP_MONGO_PING=true
    SKIP_MONGO_PING=true
    MONGO_URL=
    OPENAI_API_KEY=sk-test-key-for-pytest-only
