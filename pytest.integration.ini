[pytest]
testpaths = tests/integration
pythonpath = .
addopts = -q --disable-warnings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    integration: full integration suite (database, Redis, Mongo)
    app_profile: requires app-owned bootstrap, routes, or models under apps/
    redis: requires a live Redis instance — set REDIS_URL before running
    multi_instance: requires fakeredis for cross-instance simulation
    mongo: requires a live MongoDB instance — set MONGO_URL before running
    postgres: exercises PostgreSQL-specific behavior (FK cascades, JSONB, UUID)
# Run with:
#   docker compose -f docker-compose.test.yml up -d
#   pytest -c pytest.integration.ini -v
# env blocks require pytest-env (listed in pyproject.toml [test] deps).
# DATABASE_URL must be set by the calling environment — not defaulted here
# so a missing URL fails loudly rather than silently using SQLite.
env =
    DATABASE_URL=postgresql://aindy_test:aindy_test@localhost:5433/aindy_test
    REDIS_URL=redis://localhost:6380/0
    MONGO_URL=mongodb://localhost:27017
    AINDY_ALLOW_SQLITE=false
    AINDY_SKIP_MONGO_PING=false
    SKIP_MONGO_PING=false
    TEST_MODE=true
    ENV=test
    TESTING=true
    AINDY_ASYNC_HEAVY_EXECUTION=false
    AINDY_ENABLE_BACKGROUND_TASKS=false
    AINDY_ENFORCE_SCHEMA=false
    SECRET_KEY=ci-integration-secret-key
    PERMISSION_SECRET=ci-integration-permission-secret
    AINDY_API_KEY=ci-integration-api-key
    OPENAI_API_KEY=sk-test-placeholder
    DEEPSEEK_API_KEY=ds-test-placeholder
    ALLOWED_ORIGINS=http://localhost:3000
    AINDY_ENABLE_LEGACY_SURFACE=true
    AINDY_AGENT_PLANNER_BACKEND=stub
